<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Whac-A-Mole</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #151515; color: #f4f4f4; font-family: Arial, sans-serif; }
    main { width: min(92vw, 420px); text-align: center; }
    .bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    button { border: 1px solid #666; background: #24272d; color: #fff; cursor: pointer; }
    .hole { aspect-ratio: 1; border-radius: 50%; font-size: 38px; }
    .hole.active { background: #6f4b2d; }
    p { min-height: 20px; color: #c8c8c8; }
    .classic-world-menu-link { position: fixed; top: 14px; left: 14px; z-index: 9999; border: 1px solid rgba(255,255,255,.35); border-radius: 8px; padding: 9px 12px; background: rgba(12,13,16,.88); color: #fff; font: 700 14px/1 Arial,sans-serif; text-decoration: none; }
    .classic-world-menu-link:hover, .classic-world-menu-link:focus-visible { background: #f3c15f; color: #111; outline: none; }
  </style>
</head>
<body>
  <a class="classic-world-menu-link" href="../index.html">Back to Menu</a>
  <main>
    <div class="bar"><strong>Whac-A-Mole</strong><span id="score">Score: 0</span><button id="start" type="button">Start</button></div>
    <div class="board" id="board" aria-label="Whac-A-Mole board"></div>
    <p id="status">Hit 20 moles before time runs out.</p>
  </main>
  <script>
    const board = document.getElementById("board");
    const scoreEl = document.getElementById("score");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("start");
    let score = 0, active = -1, timeLeft = 30, timer, moleTimer, playing = false;

    for (let i = 0; i < 9; i += 1) {
      const hole = document.createElement("button");
      hole.className = "hole";
      hole.type = "button";
      hole.addEventListener("click", () => hit(i));
      board.appendChild(hole);
    }

    function start() {
      score = 0; timeLeft = 30; playing = true;
      scoreEl.textContent = "Score: 0";
      statusEl.textContent = "Time: 30";
      clearInterval(timer); clearInterval(moleTimer);
      timer = setInterval(tick, 1000);
      moleTimer = setInterval(showMole, 620);
      showMole();
    }

    function showMole() {
      [...board.children].forEach(h => { h.classList.remove("active"); h.textContent = ""; });
      active = Math.floor(Math.random() * 9);
      board.children[active].classList.add("active");
      board.children[active].textContent = "!";
    }

    function hit(index) {
      if (!playing || index !== active) return;
      score += 1;
      scoreEl.textContent = `Score: ${score}`;
      if (score >= 20) finish("You win. Start to play again.");
      else showMole();
    }

    function tick() {
      timeLeft -= 1;
      statusEl.textContent = `Time: ${timeLeft}`;
      if (timeLeft <= 0) finish(`Time up. Score: ${score}.`);
    }

    function finish(text) {
      playing = false;
      clearInterval(timer); clearInterval(moleTimer);
      [...board.children].forEach(h => { h.classList.remove("active"); h.textContent = ""; });
      statusEl.textContent = text;
    }

    startBtn.addEventListener("click", start);
  </script>
</body>
</html>
