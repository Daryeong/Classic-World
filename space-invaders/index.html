<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cosmic Defense</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101418;
      color: #f4f7fb;
      font-family: Arial, Helvetica, sans-serif;
    }
    main { width: min(94vw, 760px); }
    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 12px;
    }
    h1 { margin: 0; font-size: 24px; }
    .controls { margin-top: 6px; color: #aeb9c6; font-size: 14px; }
    .hud { display: flex; gap: 14px; align-items: center; color: #cbd5df; font-size: 14px; }
    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #070a0d;
      border: 1px solid #2b3540;
    }
    button {
      border: 1px solid #526170;
      background: #1d252d;
      color: #f4f7fb;
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
    }
  
    .classic-world-menu-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      padding: 9px 12px;
      background: rgba(12, 13, 16, 0.88);
      color: #fff;
      font: 700 14px/1 Arial, sans-serif;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .classic-world-menu-link:hover,
    .classic-world-menu-link:focus-visible {
      background: #f3c15f;
      color: #111;
      outline: none;
    }
  </style>
</head>
<body>
    <a class="classic-world-menu-link" href="../index.html" aria-label="Back to menu">Back to Menu</a>
  <main>
    <header>
      <div>
        <h1>Cosmic Defense</h1>
        <div class="controls">Arrow keys to move, Space to fire, Enter to restart</div>
      </div>
      <div class="hud">
        <span>Score <strong id="score">0</strong></span>
        <span>Lives <strong id="lives">3</strong></span>
        <button id="restart" type="button">Restart</button>
      </div>
    </header>
    <canvas id="game" width="720" height="540" aria-label="Cosmic Defense game"></canvas>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const restartBtn = document.getElementById("restart");
    const keys = new Set();
    const enemyShotInterval = 26;
    const enemyShotSpeed = 6;

    let player;
    let invaders;
    let shots;
    let enemyShots;
    let score;
    let lives;
    let direction;
    let lastEnemyShot;
    let status;

    function reset() {
      player = { x: 340, y: 490, w: 40, h: 16, cooldown: 0 };
      invaders = [];
      shots = [];
      enemyShots = [];
      score = 0;
      lives = 3;
      direction = 1;
      lastEnemyShot = 0;
      status = "playing";

      for (let row = 0; row < 4; row += 1) {
        for (let col = 0; col < 9; col += 1) {
          invaders.push({ x: 82 + col * 58, y: 64 + row * 42, w: 30, h: 20, alive: true });
        }
      }
      updateHud();
    }

    function updateHud() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
    }

    function rectsTouch(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function shoot() {
      if (player.cooldown > 0 || status !== "playing") return;
      shots.push({ x: player.x + player.w / 2 - 2, y: player.y - 12, w: 4, h: 12 });
      player.cooldown = 18;
    }

    function update() {
      if (status !== "playing") return;
      if (keys.has("ArrowLeft")) player.x -= 5;
      if (keys.has("ArrowRight")) player.x += 5;
      if (keys.has(" ")) shoot();

      player.x = Math.max(12, Math.min(canvas.width - player.w - 12, player.x));
      player.cooldown = Math.max(0, player.cooldown - 1);

      let edge = false;
      for (const invader of invaders) {
        if (!invader.alive) continue;
        invader.x += direction * 1.1;
        edge = edge || invader.x < 24 || invader.x + invader.w > canvas.width - 24;
      }
      if (edge) {
        direction *= -1;
        for (const invader of invaders) invader.y += 16;
      }

      for (const shot of shots) shot.y -= 7;
      for (const shot of enemyShots) shot.y += enemyShotSpeed;
      shots = shots.filter((shot) => shot.y + shot.h > 0);
      enemyShots = enemyShots.filter((shot) => shot.y < canvas.height);

      lastEnemyShot += 1;
      const living = invaders.filter((invader) => invader.alive);
      if (living.length && lastEnemyShot > enemyShotInterval) {
        const enemy = living[Math.floor(Math.random() * living.length)];
        enemyShots.push({ x: enemy.x + enemy.w / 2 - 4, y: enemy.y + enemy.h, w: 8, h: 14 });
        lastEnemyShot = 0;
      }

      for (const shot of shots) {
        for (const invader of invaders) {
          if (invader.alive && rectsTouch(shot, invader)) {
            invader.alive = false;
            shot.y = -100;
            score += 10;
            updateHud();
            break;
          }
        }
      }

      for (const shot of enemyShots) {
        if (rectsTouch(shot, player)) {
          shot.y = canvas.height + 100;
          lives -= 1;
          updateHud();
          if (lives <= 0) status = "gameover";
        }
      }

      if (living.some((invader) => invader.y + invader.h >= player.y)) status = "gameover";
      if (invaders.every((invader) => !invader.alive)) status = "win";
    }

    function drawMessage(message, detail) {
      ctx.fillStyle = "rgba(7, 10, 13, 0.74)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#f4f7fb";
      ctx.font = "700 34px Arial";
      ctx.textAlign = "center";
      ctx.fillText(message, canvas.width / 2, canvas.height / 2 - 10);
      ctx.font = "16px Arial";
      ctx.fillStyle = "#cbd5df";
      ctx.fillText(detail, canvas.width / 2, canvas.height / 2 + 24);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#9be36f";
      ctx.fillRect(player.x, player.y, player.w, player.h);
      ctx.fillRect(player.x + 16, player.y - 10, 8, 10);

      ctx.fillStyle = "#60a5fa";
      for (const invader of invaders) {
        if (!invader.alive) continue;
        ctx.fillRect(invader.x, invader.y, invader.w, invader.h);
        ctx.clearRect(invader.x + 6, invader.y + 6, 5, 5);
        ctx.clearRect(invader.x + 19, invader.y + 6, 5, 5);
      }

      ctx.fillStyle = "#f8fafc";
      for (const shot of shots) ctx.fillRect(shot.x, shot.y, shot.w, shot.h);
      ctx.fillStyle = "#f97373";
      for (const shot of enemyShots) ctx.fillRect(shot.x, shot.y, shot.w, shot.h);

      if (status === "gameover") drawMessage("Game Over", "Press Enter or Restart to play again");
      if (status === "win") drawMessage("You Win", "Press Enter or Restart to play again");
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && status !== "playing") reset();
      if (["ArrowLeft", "ArrowRight", " "].includes(event.key)) event.preventDefault();
      keys.add(event.key);
    });

    document.addEventListener("keyup", (event) => keys.delete(event.key));
    restartBtn.addEventListener("click", reset);

    reset();
    loop();
  </script>
</body>
</html>
