<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Tower of Hanoi</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#101114;color:#eee;font-family:Arial,sans-serif}main{text-align:center;width:min(94vw,640px)}.towers{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.tower{height:230px;border:1px solid #555;display:flex;flex-direction:column-reverse;align-items:center;padding:10px;cursor:pointer}.disk{height:28px;margin:3px;background:#f3c15f}.sel{border-color:#fff}.classic-world-menu-link{position:fixed;top:14px;left:14px;border:1px solid #777;border-radius:8px;padding:9px 12px;background:#111;color:#fff;text-decoration:none;font-weight:700}</style></head><body><a class="classic-world-menu-link" href="../index.html">Back to Menu</a><main><h1>Tower of Hanoi</h1><div class="towers" id="towers"></div><p id="status">Move all disks to the right tower. R: restart.</p></main><script>const el=document.getElementById("towers"),status=document.getElementById("status");let towers,sel,moves;function reset(){towers=[[4,3,2,1],[],[]];sel=-1;moves=0;draw()}function pick(i){if(sel<0){if(towers[i].length)sel=i}else{const a=towers[sel][towers[sel].length-1],b=towers[i][towers[i].length-1];if(sel!==i&&(!b||a<b)){towers[i].push(towers[sel].pop());moves++}sel=-1;if(towers[2].length===4)status.textContent=`Solved in ${moves} moves. R: restart.`}draw()}function draw(){el.innerHTML="";towers.forEach((t,i)=>{const d=document.createElement("div");d.className=`tower ${i===sel?"sel":""}`;d.onclick=()=>pick(i);t.forEach(n=>{const disk=document.createElement("div");disk.className="disk";disk.style.width=30+n*28+"px";d.appendChild(disk)});el.appendChild(d)});if(towers[2].length!==4)status.textContent=`Moves: ${moves}`;}addEventListener("keydown",e=>{if(e.key==="r"||e.key==="R")reset()});reset();</script></body></html>
