<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sokoban</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #151515; color: #eee; font-family: Arial, sans-serif; }
    main { text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(8, 44px); gap: 3px; }
    .cell { width: 44px; height: 44px; display: grid; place-items: center; background: #2a2d32; font-size: 24px; }
    .wall { background: #646a75; }
    .goal { background: #4d4425; outline: 3px solid #e6c45c; outline-offset: -6px; color: #e6c45c; font-weight: 700; }
    p { color: #ccc; }
    .classic-world-menu-link { position: fixed; top: 14px; left: 14px; z-index: 9999; border: 1px solid rgba(255,255,255,.35); border-radius: 8px; padding: 9px 12px; background: rgba(12,13,16,.88); color: #fff; font: 700 14px/1 Arial,sans-serif; text-decoration: none; }
    .classic-world-menu-link:hover, .classic-world-menu-link:focus-visible { background: #f3c15f; color: #111; outline: none; }
  </style>
</head>
<body>
  <a class="classic-world-menu-link" href="../index.html">Back to Menu</a>
  <main>
    <h1>Sokoban</h1>
    <div class="grid" id="grid"></div>
    <p id="status">Push boxes onto yellow X goals. Arrow keys. R: restart.</p>
  </main>
  <script>
    const levels = [
      [
        "########",
        "#      #",
        "#  .B  #",
        "#  ##  #",
        "# P B. #",
        "#      #",
        "########"
      ],
      [
        "########",
        "#  .   #",
        "#  B#  #",
        "# P B. #",
        "#   #  #",
        "#      #",
        "########"
      ],
      [
        "########",
        "# .  . #",
        "# B##  #",
        "#  P B #",
        "#      #",
        "#      #",
        "########"
      ],
      [
        "########",
        "#   .  #",
        "#  #B  #",
        "# P B. #",
        "#      #",
        "#      #",
        "########"
      ],
      [
        "########",
        "# .    #",
        "# B #  #",
        "#   #. #",
        "# P B  #",
        "#      #",
        "########"
      ],
      [
        "########",
        "#  .   #",
        "#  B   #",
        "# ## # #",
        "# P B. #",
        "#      #",
        "########"
      ],
      [
        "########",
        "# .  . #",
        "# B  B #",
        "#   #  #",
        "# P    #",
        "#      #",
        "########"
      ],
      [
        "########",
        "#    . #",
        "# ## B #",
        "# .B   #",
        "#  P   #",
        "#      #",
        "########"
      ],
      [
        "########",
        "# .    #",
        "# B #. #",
        "#   #B #",
        "# P    #",
        "#      #",
        "########"
      ],
      [
        "########",
        "# .  . #",
        "#  BB  #",
        "#  ##  #",
        "# P    #",
        "#      #",
        "########"
      ]
    ];
    const gridEl = document.getElementById("grid");
    const statusEl = document.getElementById("status");
    let walls, goals, boxes, player, level = 0, solved = false;

    function reset() {
      walls = new Set(); goals = new Set(); boxes = new Set();
      solved = false;
      const map = levels[level];
      map.forEach((line, y) => [...line].forEach((ch, x) => {
        const key = `${x},${y}`;
        if (ch === "#") walls.add(key);
        if (ch === ".") goals.add(key);
        if (ch === "B") boxes.add(key);
        if (ch === "P") player = { x, y };
      }));
      statusEl.textContent = `Level ${level + 1}: push boxes onto yellow X goals. R: restart.`;
      draw();
    }

    function move(dx, dy) {
      if (solved) return;
      const next = { x: player.x + dx, y: player.y + dy };
      const key = `${next.x},${next.y}`;
      if (walls.has(key)) return;
      if (boxes.has(key)) {
        const beyond = `${next.x + dx},${next.y + dy}`;
        if (walls.has(beyond) || boxes.has(beyond)) return;
        boxes.delete(key); boxes.add(beyond);
      }
      player = next;
      if ([...boxes].every(b => goals.has(b))) {
        solved = true;
        statusEl.textContent = level < levels.length - 1 ? "Solved. N: next level." : "All levels solved. R: restart.";
      }
      draw();
    }

    function draw() {
      gridEl.innerHTML = "";
      const map = levels[level];
      for (let y = 0; y < map.length; y += 1) for (let x = 0; x < 8; x += 1) {
        const key = `${x},${y}`;
        const cell = document.createElement("div");
        cell.className = `cell ${walls.has(key) ? "wall" : ""} ${goals.has(key) ? "goal" : ""}`;
        if (goals.has(key)) cell.textContent = "X";
        if (boxes.has(key)) cell.textContent = goals.has(key) ? "OK" : "B";
        if (player.x === x && player.y === y) cell.textContent = "P";
        gridEl.appendChild(cell);
      }
    }

    addEventListener("keydown", e => {
      if (e.key === "r" || e.key === "R") reset();
      if ((e.key === "n" || e.key === "N") && solved && level < levels.length - 1) { level += 1; reset(); }
      const dirs = { ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0] };
      if (dirs[e.key]) { e.preventDefault(); move(...dirs[e.key]); }
    });
    reset();
  </script>
</body>
</html>
