<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Number Guess</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #101114; color: #eee; font-family: Arial, sans-serif; }
    main { text-align: center; width: min(92vw, 420px); }
    input, button { padding: 10px; margin: 6px; background: #222; color: #fff; border: 1px solid #666; }
    p { color: #ccc; line-height: 1.5; }
    .classic-world-menu-link { position: fixed; top: 14px; left: 14px; border: 1px solid #777; border-radius: 8px; padding: 9px 12px; background: #111; color: #fff; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <a class="classic-world-menu-link" href="../index.html">Back to Menu</a>
  <main>
    <h1>Number Guess</h1>
    <p>1부터 100 사이의 숨겨진 숫자를 맞춥니다. 한 번 틀릴 때마다 입력한 숫자가 너무 낮은지, 너무 높은지 알려줍니다.</p>
    <input id="guess" type="number" min="1" max="100" aria-label="Guess">
    <button onclick="check()">Guess</button>
    <button onclick="reset()">Restart</button>
    <p id="status"></p>
  </main>
  <script>
    let target, tries, done;
    const guessEl = document.getElementById("guess");
    const statusEl = document.getElementById("status");

    function reset() {
      target = 1 + Math.floor(Math.random() * 100);
      tries = 7;
      done = false;
      guessEl.value = "";
      statusEl.textContent = "7 tries left. Enter a number, then press Guess.";
      guessEl.focus();
    }

    function check() {
      if (done) return;
      const guess = Number(guessEl.value);
      if (!Number.isInteger(guess) || guess < 1 || guess > 100) {
        statusEl.textContent = "Type a whole number from 1 to 100.";
        return;
      }

      tries -= 1;
      if (guess === target) {
        done = true;
        statusEl.textContent = `Correct. ${guess} was the number. Restart to play again.`;
      } else if (tries <= 0) {
        done = true;
        statusEl.textContent = `Out of tries. It was ${target}.`;
      } else {
        statusEl.textContent = `${guess} is ${guess < target ? "too low" : "too high"}. ${tries} tries left.`;
      }
      guessEl.value = "";
      guessEl.focus();
    }

    guessEl.addEventListener("keydown", event => {
      if (event.key === "Enter") check();
    });

    reset();
  </script>
</body>
</html>
