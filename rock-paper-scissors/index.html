<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Rock Paper Scissors</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#151515;color:#eee;font-family:Arial,sans-serif}main{text-align:center}button{margin:8px;padding:12px 16px;background:#222;color:#fff;border:1px solid #666}.classic-world-menu-link{position:fixed;top:14px;left:14px;border:1px solid #777;border-radius:8px;padding:9px 12px;background:#111;color:#fff;text-decoration:none;font-weight:700}</style></head><body><a class="classic-world-menu-link" href="../index.html">Back to Menu</a><main><h1>Rock Paper Scissors</h1><p id="score">You 0 - CPU 0</p><button onclick="play('Rock')">Rock</button><button onclick="play('Paper')">Paper</button><button onclick="play('Scissors')">Scissors</button><p id="status">First to 5 wins.</p></main><script>let you=0,cpu=0;const choices=["Rock","Paper","Scissors"],score=document.getElementById("score"),status=document.getElementById("status");function play(a){if(you>=5||cpu>=5){you=0;cpu=0}const b=choices[Math.floor(Math.random()*3)];let r="Draw";if((a==="Rock"&&b==="Scissors")||(a==="Paper"&&b==="Rock")||(a==="Scissors"&&b==="Paper")){you++;r="You score"}else if(a!==b){cpu++;r="CPU scores"}score.textContent=`You ${you} - CPU ${cpu}`;status.textContent=`You: ${a}. CPU: ${b}. ${you>=5?"You win.":cpu>=5?"CPU wins.":r}`}</script></body></html>
