<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Dice 100</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#151515;color:#eee;font-family:Arial,sans-serif}main{text-align:center}button{margin:6px;padding:10px 14px;background:#222;color:#fff;border:1px solid #666}.classic-world-menu-link{position:fixed;top:14px;left:14px;border:1px solid #777;border-radius:8px;padding:9px 12px;background:#111;color:#fff;text-decoration:none;font-weight:700}</style></head><body><a class="classic-world-menu-link" href="../index.html">Back to Menu</a><main><h1>Dice 100</h1><p id="score"></p><p id="status">Roll to build turn points. Roll 1 loses the turn.</p><button onclick="roll()">Roll</button><button onclick="hold()">Hold</button><button onclick="reset()">Restart</button></main><script>let you,cpu,turn,over;const score=document.getElementById("score"),status=document.getElementById("status");function reset(){you=0;cpu=0;turn=0;over=false;draw("First to 100 wins.")}function roll(){if(over)return;const d=1+Math.floor(Math.random()*6);if(d===1){turn=0;draw("Rolled 1. Turn lost.");setTimeout(ai,400)}else{turn+=d;draw(`Rolled ${d}. Turn total ${turn}.`)}}function hold(){if(over)return;you+=turn;turn=0;if(you>=100){over=true;draw("You win.")}else ai()}function ai(){let t=0;while(t<16&&cpu+t<100){const d=1+Math.floor(Math.random()*6);if(d===1){draw("CPU rolled 1.");return}t+=d}cpu+=t;if(cpu>=100){over=true;draw("CPU wins.")}else draw(`CPU held ${t}. Your turn.`)}function draw(text){score.textContent=`You ${you} - CPU ${cpu}`;status.textContent=text}reset();</script></body></html>
