<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Checkers</title>
<style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;color:#eee;font-family:Arial,sans-serif}main{width:min(92vw,520px);text-align:center}.board{display:grid;grid-template-columns:repeat(8,1fr);border:2px solid #777}.cell{aspect-ratio:1;border:0;padding:10%;background:#ddd;cursor:pointer}.cell.dark{background:#555}.cell.selected{outline:4px solid #ffd45c;outline-offset:-4px}.piece{width:100%;height:100%;border-radius:50%;background:#d84a4a;border:3px solid #722}.piece.black{background:#171717;border-color:#aaa}.piece.king:after{content:"K";display:grid;place-items:center;height:100%;font-weight:bold;color:#fff}p{color:#ccc}.classic-world-menu-link{position:fixed;top:14px;left:14px;border:1px solid #777;border-radius:8px;padding:9px 12px;background:#111;color:#fff;font-weight:bold;text-decoration:none}</style></head>
<body><a class="classic-world-menu-link" href="../index.html">Back to Menu</a><main><h1>Checkers</h1><p id="status"></p><div class="board" id="board"></div></main>
<script>
const boardEl=document.getElementById("board"),statusEl=document.getElementById("status");let board,turn,selected;
function reset(){board=Array(64).fill(null);turn="red";selected=null;for(let i=0;i<64;i++){const row=Math.floor(i/8);if((row+i%8)%2&&row<3)board[i]={color:"black",king:false};if((row+i%8)%2&&row>4)board[i]={color:"red",king:false}}draw()}
function legalMoves(from){const piece=board[from],moves=[];if(!piece)return moves;const row=Math.floor(from/8),col=from%8,dirs=piece.king?[-1,1]:[piece.color==="red"?-1:1];for(const dr of dirs)for(const dc of[-1,1]){const r=row+dr,c=col+dc,to=r*8+c;if(r>=0&&r<8&&c>=0&&c<8&&!board[to])moves.push({to});else if(r>=0&&r<8&&c>=0&&c<8&&board[to]&&board[to].color!==piece.color){const r2=row+dr*2,c2=col+dc*2,jump=r2*8+c2;if(r2>=0&&r2<8&&c2>=0&&c2<8&&!board[jump])moves.push({to:jump,capture:to})}}return moves}
function play(index){if(board[index]?.color===turn){selected=index;draw();return}const move=selected===null?null:legalMoves(selected).find(m=>m.to===index);if(!move)return;board[index]=board[selected];board[selected]=null;if(move.capture!==undefined)board[move.capture]=null;const row=Math.floor(index/8);if(row===0||row===7)board[index].king=true;turn=turn==="red"?"black":"red";selected=null;draw()}
function draw(){boardEl.innerHTML="";board.forEach((piece,i)=>{const cell=document.createElement("button");cell.className=`cell ${(Math.floor(i/8)+i%8)%2?"dark":""} ${selected===i?"selected":""}`;cell.addEventListener("click",()=>play(i));if(piece)cell.innerHTML=`<div class="piece ${piece.color==="black"?"black":""} ${piece.king?"king":""}"></div>`;boardEl.appendChild(cell)});statusEl.textContent=`${turn[0].toUpperCase()+turn.slice(1)} to move. R: restart.`}
addEventListener("keydown",e=>{if(e.key.toLowerCase()==="r")reset()});reset();
</script></body></html>
