<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tic-Tac-Toe</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111; color: #eee; font-family: Arial, sans-serif; }
    main { width: min(92vw, 360px); text-align: center; }
    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    button.cell { aspect-ratio: 1; border: 1px solid #666; background: #222; color: #fff; font-size: 46px; cursor: pointer; }
    p { color: #ccc; }
    .classic-world-menu-link { position: fixed; top: 14px; left: 14px; border: 1px solid rgba(255,255,255,.35); border-radius: 8px; padding: 9px 12px; background: rgba(12,13,16,.88); color: #fff; font: 700 14px/1 Arial,sans-serif; text-decoration: none; }
    .classic-world-menu-link:hover, .classic-world-menu-link:focus-visible { background: #f3c15f; color: #111; outline: none; }
  </style>
</head>
<body>
  <a class="classic-world-menu-link" href="../index.html">Back to Menu</a>
  <main>
    <h1>Tic-Tac-Toe</h1>
    <div class="board" id="board"></div>
    <p id="status">You are X. R: restart.</p>
  </main>
  <script>
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    let board, over;
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function reset() {
      board = Array(9).fill("");
      over = false;
      boardEl.innerHTML = "";
      for (let i = 0; i < 9; i += 1) {
        const cell = document.createElement("button");
        cell.className = "cell";
        cell.type = "button";
        cell.addEventListener("click", () => play(i));
        boardEl.appendChild(cell);
      }
      statusEl.textContent = "You are X. R: restart.";
      draw();
    }

    function play(i) {
      if (over || board[i]) return;
      board[i] = "X";
      if (finish()) return;
      const move = best("O") ?? best("X") ?? board.findIndex(v => !v);
      if (move >= 0) board[move] = "O";
      finish();
      draw();
    }

    function best(mark) {
      for (const line of lines) {
        const values = line.map(i => board[i]);
        if (values.filter(v => v === mark).length === 2 && values.includes("")) return line[values.indexOf("")];
      }
      return null;
    }

    function finish() {
      draw();
      for (const [a,b,c] of lines) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          over = true;
          statusEl.textContent = `${board[a]} wins. R: restart.`;
          return true;
        }
      }
      if (board.every(Boolean)) { over = true; statusEl.textContent = "Draw. R: restart."; return true; }
      statusEl.textContent = "Your move.";
      return false;
    }

    function draw() {
      [...boardEl.children].forEach((cell, i) => { cell.textContent = board[i]; });
    }

    addEventListener("keydown", e => { if (e.key === "r" || e.key === "R") reset(); });
    reset();
  </script>
</body>
</html>
