<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snake</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
    }
    main {
      width: min(92vw, 480px);
      text-align: center;
    }
    canvas {
      width: 100%;
      aspect-ratio: 1;
      background: #181818;
      border: 2px solid #444;
      display: block;
    }
    .bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 10px;
      padding: 8px 10px;
      background: #1b1b1b;
      border: 1px solid #3b3b3b;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }
    .score {
      min-width: 86px;
      padding: 5px 8px;
      border: 1px solid #3f5f45;
      background: #172018;
      color: #b8f0bf;
      font-size: 14px;
    }
    p {
      margin: 10px 0 0;
      color: #aaa;
      font-size: 14px;
    }
    button {
      border: 1px solid #666;
      background: #222;
      color: #eee;
      padding: 6px 10px;
      cursor: pointer;
    }
    .hint {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .hint span {
      color: #aaa;
    }
  
    .classic-world-menu-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      padding: 9px 12px;
      background: rgba(12, 13, 16, 0.88);
      color: #fff;
      font: 700 14px/1 Arial, sans-serif;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .classic-world-menu-link:hover,
    .classic-world-menu-link:focus-visible {
      background: #f3c15f;
      color: #111;
      outline: none;
    }
  </style>
</head>
<body>
    <a class="classic-world-menu-link" href="../index.html" aria-label="Back to menu">Back to Menu</a>
  <main>
    <div class="bar">
      <h1>Snake</h1>
      <div class="score">Score <span id="score">0</span></div>
      <button id="restart" type="button">Restart</button>
    </div>
    <canvas id="board" width="480" height="480" aria-label="Snake game board"></canvas>
    <p class="hint">
      <span>Arrow keys / WASD</span>
      <span>Eat food to grow</span>
      <span>Wall or body hit ends game</span>
    </p>
  </main>

  <script>
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const restart = document.getElementById("restart");
    const size = 24;
    const cells = canvas.width / size;

    let snake;
    let food;
    let dir;
    let nextDir;
    let score;
    let gameOver;

    function reset() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      food = { x: 15, y: 10 };
      dir = { x: 1, y: 0 };
      nextDir = dir;
      score = 0;
      gameOver = false;
      scoreEl.textContent = score;
      draw();
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * cells),
          y: Math.floor(Math.random() * cells)
        };
      } while (snake.some(part => part.x === food.x && part.y === food.y));
    }

    function tick() {
      if (gameOver) return;
      dir = nextDir;

      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      const hitWall = head.x < 0 || head.y < 0 || head.x >= cells || head.y >= cells;
      const hitSelf = snake.some(part => part.x === head.x && part.y === head.y);

      if (hitWall || hitSelf) {
        gameOver = true;
        draw();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 1;
        scoreEl.textContent = score;
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.fillStyle = "#181818";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#d14b4b";
      ctx.fillRect(food.x * size, food.y * size, size, size);

      ctx.fillStyle = "#62c370";
      for (const part of snake) {
        ctx.fillRect(part.x * size + 1, part.y * size + 1, size - 2, size - 2);
      }

      if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#eee";
        ctx.font = "32px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = "16px Arial";
        ctx.fillText("Press Restart", canvas.width / 2, canvas.height / 2 + 24);
      }
    }

    function setDirection(x, y) {
      if (nextDir.x + x === 0 && nextDir.y + y === 0) return;
      nextDir = { x, y };
    }

    document.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();
      if (key === "arrowup" || key === "w") setDirection(0, -1);
      if (key === "arrowdown" || key === "s") setDirection(0, 1);
      if (key === "arrowleft" || key === "a") setDirection(-1, 0);
      if (key === "arrowright" || key === "d") setDirection(1, 0);
      if (["arrowup", "arrowdown", "arrowleft", "arrowright"].includes(key)) event.preventDefault();
    });

    restart.addEventListener("click", reset);
    reset();
    setInterval(tick, 85);
  </script>
</body>
</html>
