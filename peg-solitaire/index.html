<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Peg Solitaire</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#151515;color:#eee;font-family:Arial,sans-serif}main{text-align:center}.board{display:grid;grid-template-columns:repeat(5,54px);gap:6px}button.cell{width:54px;height:54px;border-radius:50%;border:1px solid #666;background:#222;color:#fff;font-size:24px}.peg{background:#d6b33f!important}.sel{outline:3px solid #fff}.classic-world-menu-link{position:fixed;top:14px;left:14px;border:1px solid #777;border-radius:8px;padding:9px 12px;background:#111;color:#fff;text-decoration:none;font-weight:700}</style></head><body><a class="classic-world-menu-link" href="../index.html">Back to Menu</a><main><h1>Peg Solitaire</h1><div class="board" id="board"></div><p id="status">Jump pegs into empty holes. R: restart.</p></main><script>const boardEl=document.getElementById("board"),status=document.getElementById("status");let pegs,sel;function reset(){pegs=Array(25).fill(true);pegs[12]=false;sel=-1;draw()}function click(i){if(pegs[i]){sel=i;draw();return}if(sel<0)return;const sx=sel%5,sy=Math.floor(sel/5),x=i%5,y=Math.floor(i/5),mx=(sx+x)/2,my=(sy+y)/2,mid=my*5+mx;if((Math.abs(sx-x)===2&&sy===y||Math.abs(sy-y)===2&&sx===x)&&pegs[mid]){pegs[sel]=false;pegs[mid]=false;pegs[i]=true;sel=-1;status.textContent=`Pegs left: ${pegs.filter(Boolean).length}`}draw()}function draw(){boardEl.innerHTML="";pegs.forEach((p,i)=>{const b=document.createElement("button");b.className=`cell ${p?"peg":""} ${i===sel?"sel":""}`;b.textContent=p?"O":"";b.onclick=()=>click(i);boardEl.appendChild(b)})}addEventListener("keydown",e=>{if(e.key==="r"||e.key==="R")reset()});reset();</script></body></html>
