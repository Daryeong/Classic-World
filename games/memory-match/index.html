<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory Match</title>
  <style>
    body {
      margin: 24px;
      font-family: Arial, sans-serif;
      background: #000;
      color: #f2f2f2;
    }

    main {
      max-width: 420px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    #status {
      min-height: 20px;
      margin-bottom: 12px;
      font-weight: bold;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .card {
      aspect-ratio: 1;
      border: 1px solid #777;
      background: #222;
      color: #fff;
      font-size: 30px;
      font-weight: bold;
    }

    .card.open,
    .card.matched {
      background: #f2f2f2;
      color: #111;
    }
  
    .classic-world-menu-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      padding: 9px 12px;
      background: rgba(12, 13, 16, 0.88);
      color: #fff;
      font: 700 14px/1 Arial, sans-serif;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .classic-world-menu-link:hover,
    .classic-world-menu-link:focus-visible {
      background: #f3c15f;
      color: #111;
      outline: none;
    }
  </style>
</head>
<body>
    <a class="classic-world-menu-link" href="../index.html" aria-label="Back to menu">Back to Menu</a>
  <main>
    <header>
      <h1>Memory Match</h1>
      <button id="reset" type="button">New Game</button>
    </header>
    <div id="status"></div>
    <div id="board" aria-label="Memory match board"></div>
  </main>

  <script>
    const values = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
    const board = document.getElementById('board');
    const statusText = document.getElementById('status');
    const resetButton = document.getElementById('reset');

    let cards = [];
    let first = null;
    let second = null;
    let locked = false;
    let moves = 0;

    function startGame() {
      cards = shuffle([...values, ...values]).map((value, index) => ({
        value,
        index,
        open: false,
        matched: false
      }));
      first = null;
      second = null;
      locked = false;
      moves = 0;
      statusText.textContent = 'Find all pairs.';
      render();
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }

    function chooseCard(index) {
      const card = cards[index];
      if (locked || card.open || card.matched) return;

      card.open = true;
      if (!first) {
        first = card;
        render();
        return;
      }

      second = card;
      moves += 1;
      render();

      if (first.value === second.value) {
        first.matched = true;
        second.matched = true;
        first = null;
        second = null;
        updateStatus();
        render();
        return;
      }

      locked = true;
      setTimeout(() => {
        first.open = false;
        second.open = false;
        first = null;
        second = null;
        locked = false;
        updateStatus();
        render();
      }, 650);
    }

    function updateStatus() {
      if (cards.every((card) => card.matched)) {
        statusText.textContent = `Cleared in ${moves} moves.`;
      } else {
        statusText.textContent = `Moves: ${moves}`;
      }
    }

    function render() {
      board.innerHTML = '';
      cards.forEach((card) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'card' + (card.open ? ' open' : '') + (card.matched ? ' matched' : '');
        button.textContent = card.open || card.matched ? card.value : '?';
        button.setAttribute('aria-label', `Card ${card.index + 1}`);
        button.addEventListener('click', () => chooseCard(card.index));
        board.appendChild(button);
      });
    }

    resetButton.addEventListener('click', startGame);
    startGame();
  </script>
</body>
</html>
