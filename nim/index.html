<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Nim</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;color:#eee;font-family:Arial,sans-serif}main{text-align:center;width:min(92vw,420px)}button{margin:6px;padding:10px 14px;background:#222;color:#fff;border:1px solid #666;cursor:pointer}.pile{font-size:44px;letter-spacing:4px}.classic-world-menu-link{position:fixed;top:14px;left:14px;border:1px solid #777;border-radius:8px;padding:9px 12px;background:#111;color:#fff;text-decoration:none;font-weight:700}</style></head><body><a class="classic-world-menu-link" href="../index.html">Back to Menu</a><main><h1>Nim</h1><div class="pile" id="pile"></div><p id="status"></p><button onclick="take(1)">Take 1</button><button onclick="take(2)">Take 2</button><button onclick="take(3)">Take 3</button><button onclick="reset()">Restart</button></main><script>let stones;const pile=document.getElementById("pile"),status=document.getElementById("status");function reset(){stones=15;draw("Take 1-3 stones. You want to take the last stone.")}function take(n){if(stones<=0||n>stones)return;stones-=n;if(stones===0){draw("You win. Restart to play again.");return}const ai=Math.min(3,stones,stones%4||1);stones-=ai;draw(stones?`AI took ${ai}. Your turn.`:`AI took the last stone. You lose.`)}function draw(text){pile.textContent="O".repeat(stones);status.textContent=text}reset();</script></body></html>
