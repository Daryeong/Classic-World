<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Maze Chase</title>
<style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#080810;color:#eee;font-family:Arial,sans-serif}main{width:min(92vw,480px);text-align:center}canvas{width:100%;height:auto;border:2px solid #555;background:#000;image-rendering:pixelated}p{color:#ccc}.classic-world-menu-link{position:fixed;top:14px;left:14px;border:1px solid #777;border-radius:8px;padding:9px 12px;background:#111;color:#fff;font-weight:bold;text-decoration:none}</style></head>
<body><a class="classic-world-menu-link" href="../index.html">Back to Menu</a><main><h1>Maze Chase</h1><canvas id="game" width="440" height="440"></canvas><p id="status">Arrow keys. Collect every dot. R: restart.</p></main>
<script>
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),statusEl=document.getElementById("status"),map=["###########","#.........#","#.###.###.#","#.........#","###.#.#.###","#...#.#...#","#.#.....#.#","#.###.###.#","#.........#","#.........#","###########"],size=40,keys={},dirs={ArrowLeft:[-1,0],ArrowRight:[1,0],ArrowUp:[0,-1],ArrowDown:[0,1]};let player,enemy,dots,over,last,run=0;
function reset(){run++;player={x:1,y:1};enemy={x:9,y:9};dots=new Set;over=false;last=0;map.forEach((row,y)=>[...row].forEach((v,x)=>{if(v===".")dots.add(`${x},${y}`)}));dots.delete("1,1");requestAnimationFrame(t=>loop(t,run))}
function open(x,y){return map[y]?.[x]&&map[y][x]!=="#"}
function step(now){const key=Object.keys(dirs).find(k=>keys[k]);if(key){const[dx,dy]=dirs[key],x=player.x+dx,y=player.y+dy;if(open(x,y)){player={x,y};dots.delete(`${x},${y}`);keys[key]=false}}const options=Object.values(dirs).map(([dx,dy])=>({x:enemy.x+dx,y:enemy.y+dy})).filter(p=>open(p.x,p.y)).sort((a,b)=>Math.abs(a.x-player.x)+Math.abs(a.y-player.y)-Math.abs(b.x-player.x)-Math.abs(b.y-player.y));if(options[0]&&now-last>220){enemy=options[Math.random()<.7?0:Math.floor(Math.random()*options.length)];last=now}if(enemy.x===player.x&&enemy.y===player.y){over=true;statusEl.textContent="Caught. Press R to restart."}else if(!dots.size){over=true;statusEl.textContent="Maze cleared! Press R to restart."}}
function draw(){ctx.clearRect(0,0,440,440);map.forEach((row,y)=>[...row].forEach((v,x)=>{if(v==="#"){ctx.fillStyle="#263fa6";ctx.fillRect(x*size,y*size,size,size)}if(dots.has(`${x},${y}`)){ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(x*size+20,y*size+20,4,0,7);ctx.fill()}}));ctx.fillStyle="#ffd83d";ctx.beginPath();ctx.arc(player.x*size+20,player.y*size+20,14,0,7);ctx.fill();ctx.fillStyle="#e94b4b";ctx.beginPath();ctx.arc(enemy.x*size+20,enemy.y*size+20,14,0,7);ctx.fill()}
function loop(now,id){if(id!==run)return;if(!over)step(now);draw();if(!over)requestAnimationFrame(t=>loop(t,id))}
addEventListener("keydown",e=>{if(dirs[e.key]){e.preventDefault();keys[e.key]=true}if(e.key.toLowerCase()==="r")reset()});reset();
</script></body></html>
