<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Reaction Timer</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#151515;color:#eee;font-family:Arial,sans-serif}main{text-align:center}.box{width:min(80vw,420px);height:240px;display:grid;place-items:center;background:#333;border:1px solid #777;cursor:pointer;font-size:24px}.ready{background:#2f7d4f}.classic-world-menu-link{position:fixed;top:14px;left:14px;border:1px solid #777;border-radius:8px;padding:9px 12px;background:#111;color:#fff;text-decoration:none;font-weight:700}</style></head><body><a class="classic-world-menu-link" href="../index.html">Back to Menu</a><main><h1>Reaction Timer</h1><div class="box" id="box">Click to start</div><p id="status">Wait for green, then click.</p></main><script>const box=document.getElementById("box"),status=document.getElementById("status");let waiting=false,ready=false,start=0,timer;box.onclick=()=>{if(!waiting){waiting=true;ready=false;box.className="box";box.textContent="Wait...";status.textContent="Do not click yet.";timer=setTimeout(()=>{ready=true;start=performance.now();box.className="box ready";box.textContent="Click!"},900+Math.random()*2200);return}if(!ready){clearTimeout(timer);waiting=false;box.textContent="Too soon. Click to retry.";status.textContent="False start."}else{const ms=Math.round(performance.now()-start);waiting=false;ready=false;box.className="box";box.textContent="Click to start";status.textContent=`Reaction: ${ms} ms.`}}</script></body></html>
