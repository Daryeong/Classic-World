<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Color Flood</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111;color:#eee;font-family:Arial,sans-serif}main{text-align:center}.board{display:grid;grid-template-columns:repeat(8,34px);gap:3px}.cell{width:34px;height:34px}.classic-world-menu-link{position:fixed;top:14px;left:14px;border:1px solid #777;border-radius:8px;padding:9px 12px;background:#111;color:#fff;text-decoration:none;font-weight:700}button{margin:6px;padding:12px;border:1px solid #777}</style></head><body><a class="classic-world-menu-link" href="../index.html">Back to Menu</a><main><h1>Color Flood</h1><div class="board" id="board"></div><p id="status"></p><div id="picks"></div></main><script>const colors=["#d94f4f","#4f8ed9","#58b86b","#d6b33f"],boardEl=document.getElementById("board"),picks=document.getElementById("picks"),status=document.getElementById("status");let grid,moves;function reset(){grid=Array.from({length:64},()=>Math.floor(Math.random()*4));moves=20;draw()}function flood(c){const old=grid[0];if(old===c||moves<=0)return;const seen=new Set();function fill(i){if(seen.has(i)||grid[i]!==old)return;seen.add(i);grid[i]=c;const x=i%8,y=Math.floor(i/8);[[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{const nx=x+dx,ny=y+dy;if(nx>=0&&nx<8&&ny>=0&&ny<8)fill(ny*8+nx)})}fill(0);moves--;draw()}function draw(){boardEl.innerHTML="";grid.forEach(v=>{const d=document.createElement("div");d.className="cell";d.style.background=colors[v];boardEl.appendChild(d)});status.textContent=grid.every(v=>v===grid[0])?"Solved.":`Moves left: ${moves}`;picks.innerHTML="";colors.forEach((c,i)=>{const b=document.createElement("button");b.style.background=c;b.onclick=()=>flood(i);picks.appendChild(b)})}reset();</script></body></html>
