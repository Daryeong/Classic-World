<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Word Scramble</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#151515;color:#eee;font-family:Arial,sans-serif}main{text-align:center}input,button{padding:10px;margin:6px;background:#222;color:#fff;border:1px solid #666}.word{font-size:34px;letter-spacing:5px}.classic-world-menu-link{position:fixed;top:14px;left:14px;border:1px solid #777;border-radius:8px;padding:9px 12px;background:#111;color:#fff;text-decoration:none;font-weight:700}</style></head><body><a class="classic-world-menu-link" href="../index.html">Back to Menu</a><main><h1>Word Scramble</h1><div class="word" id="scramble"></div><input id="answer"><button onclick="check()">Check</button><button onclick="reset()">Next</button><p id="status">Unscramble the word.</p></main><script>const words=["ARCADE","BUTTON","PUZZLE","PLAYER","CLASSIC"],scr=document.getElementById("scramble"),ans=document.getElementById("answer"),status=document.getElementById("status");let word;function reset(){word=words[Math.floor(Math.random()*words.length)];scr.textContent=word.split("").sort(()=>Math.random()-.5).join("");ans.value="";status.textContent="Unscramble the word."}function check(){status.textContent=ans.value.toUpperCase()===word?"Correct. Next for another.":`Nope. ${word.length} letters.`}reset();</script></body></html>
